<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMLI Idiomas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============ LOGIN ============ -->
  <div id="login-screen">
    <div class="login-bg"></div>
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">VMLI</div>
        <div class="login-logo-sub">Sistema de Gestão</div>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="seu@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">Entrar</button>
        <button type="button" class="btn-link" id="forgot-btn">Esqueci minha senha</button>
      </form>
    </div>
  </div>

  <!-- ============ APP ============ -->
  <div id="app">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <span class="slogo-main">VMLI</span>
          <span class="slogo-sub">Idiomas</span>
        </div>
        <button class="sidebar-close" id="sidebar-close">✕</button>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" id="sidebar-user"></div>
        <button class="btn-logout" id="logout-btn">↩ Sair</button>
      </div>
    </aside>

    <!-- Main area -->
    <div class="main-wrapper">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn">☰</button>
        <h1 class="page-title" id="page-title">Dashboard</h1>
        <div class="topbar-right">
          <span class="role-badge" id="role-badge"></span>
        </div>
      </header>
      <main class="content" id="content">
        <div class="loading"><div class="spinner"></div></div>
      </main>
    </div>

  </div>

  <!-- ============ MODAL ============ -->
  <div id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- ============ TOASTS ============ -->
  <div id="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
